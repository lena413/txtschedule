<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="dark" name="color-scheme"/>
<style>:root { color-scheme: dark; }
  .today-banner {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.45s;
  }

  .today-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .today-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    background: rgba(255,45,155,0.15);
    border: 1px solid rgba(255,45,155,0.3);
    border-radius: 100px;
    padding: 3px 10px;
  }

  .today-date {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .today-events {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .today-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    text-decoration: none;
  }

  .today-item:hover {
    transform: translateX(4px);
  }

  .today-item.concert { border-left: 3px solid var(--concert); }
  .today-item.concert:hover { border-color: var(--concert); }
  .today-item.album { border-left: 3px solid var(--album); }
  .today-item.album:hover { border-color: var(--album); }
  .today-item.promo { border-left: 3px solid var(--promo); }
  .today-item.promo:hover { border-color: var(--promo); }
  .today-item.live { border-left: 3px solid var(--live); }
  .today-item.live:hover { border-color: var(--live); }
  .today-item.anniversary { border-left: 3px solid var(--anniversary); }
  .today-item.anniversary:hover { border-color: var(--anniversary); }

  .today-item-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .today-item-dday {
    font-size: 12px;
    font-weight: 900;
    color: var(--album);
    flex-shrink: 0;
    letter-spacing: -0.03em;
    width: 52px;
  }

  .today-item-date {
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    white-space: nowrap;
    width: 52px;
  }

  .today-item.concert .today-item-date { color: var(--concert); }
  .today-item.album .today-item-date { color: var(--album); }
  .today-item.promo .today-item-date { color: var(--promo); }
  .today-item.live .today-item-date { color: var(--live); }
  .today-item.anniversary .today-item-date { color: var(--anniversary); }

  .today-item-time {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .today-item-arrow {
    font-size: 11px;
    color: var(--muted);
  }

  .today-empty {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    padding: 4px 0;
  }


  .countdown-banner {
    border: 1px solid rgba(170,255,0,0.3);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 40px;
    background: rgba(170,255,0,0.05);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.43s;
  }

  .countdown-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .countdown-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--album);
    background: rgba(170,255,0,0.13);
    border: 1px solid rgba(170,255,0,0.3);
    border-radius: 100px;
    padding: 3px 10px;
  }

  .countdown-title {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .countdown-blocks {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .countdown-block {
    background: var(--card);
    border: 1px solid rgba(170,255,0,0.2);
    border-radius: 12px;
    padding: 12px 18px;
    text-align: center;
    min-width: 64px;
  }

  .countdown-num {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--album);
    line-height: 1;
    display: block;
  }

  .countdown-unit {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-top: 4px;
    display: block;
  }

  .countdown-done {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--album);
    padding: 4px 0;
  }

</style>
<title>TXT 2026 스케줄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --card: #141414;
    --border: #282828;
    --accent: #ff2d9b;
    --accent2: #ff6ec7;
    --accent3: #cc0077;
    --text: #f0f0f0;
    --muted: #666666;
    --concert: #ff2d9b;   /* 형광 핑크 — 콘서트 */
    --album: #aaff00;     /* 형광 그린 — 앨범/컴백 */
    --promo: #f5c800;     /* 옐로우 — 프로모션 */
    --live: #9b5fd4;     /* 보라 — 위버스/SNS */
    --anniversary: #9b5fd4; /* 보라 — 기념일 */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #080808 !important;
    background-color: #080808 !important;
    color: var(--text) !important;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 그리드 효과 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,45,155,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(170,255,0,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 12px;
    position: relative;
    z-index: 1;
  }

  /* 헤더 */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 50px;
  }

  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-block {}

  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  h1 {
    font-size: clamp(42px, 10vw, 80px);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.04em;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  h1 .txt {
    color: var(--accent);
    display: block;
  }

  h1 .year {
    color: var(--text);
    display: block;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.35s;
  }

  .header-right {
    text-align: right;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .member-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  .pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* 범례 */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }

  .legend-item:hover { color: var(--text); }
  .legend-item.active { color: var(--text); border-color: var(--border); background: var(--card); }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* 타임라인 */
  .timeline {
    position: relative;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 76px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }

  /* 이벤트 카드 */
  .event {
    display: flex;
    align-items: flex-start;
    gap: 0;
    margin-bottom: 12px;
    position: relative;
  }

  .event-date {
    width: 64px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 20px;
    padding-top: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .event-dot-wrap {
    width: 9px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding-top: 18px;
    margin-left: -8px;
    margin-right: 12px;
  }

  /* 월 섹션 */
  .month-section {
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .month-section:nth-child(1) { animation-delay: 0.6s; }
  .month-section:nth-child(2) { animation-delay: 0.7s; }
  .month-section:nth-child(3) { animation-delay: 0.8s; }
  .month-section:nth-child(4) { animation-delay: 0.9s; }
  .month-section:nth-child(5) { animation-delay: 1.0s; }
  .month-section:nth-child(6) { animation-delay: 1.1s; }

  .month-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-left: 0;
    cursor: pointer;
    user-select: none;
  }

  .month-header:hover .month-num {
    color: var(--accent);
    transition: color 0.2s;
  }

  .month-toggle {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    padding-right: 4px;
    transition: color 0.2s;
  }

  .month-header:hover .month-toggle {
    color: var(--accent);
  }

  .toggle-arrow {
    display: inline-block;
    transition: transform 0.3s ease;
    font-size: 10px;
  }

  .month-section.collapsed .toggle-arrow {
    transform: rotate(-90deg);
  }

  .month-section.collapsed .month-num {
    color: var(--muted);
  }

  .month-events {
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    max-height: 9999px;
    opacity: 1;
  }

  .month-section.collapsed .month-events {
    max-height: 0;
    opacity: 0;
  }

  .month-section.collapsed {
    margin-bottom: 16px;
  }

  /* 지난 달 배지 */
  .past-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 2px 8px;
    letter-spacing: 0.1em;
    margin-left: 8px;
    vertical-align: middle;
  }

  .month-num {
    font-family: 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    color: var(--border);
    line-height: 1;
    width: 80px;
    flex-shrink: 0;
    text-align: right;
    letter-spacing: -0.05em;
  }

  .month-name {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding-left: 24px;
  }

  /* 이벤트 카드 */

  .event-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 2px solid;
    background: var(--bg);
    flex-shrink: 0;
  }

  .event-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-left: 16px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .event-card:hover {
    transform: translateX(4px);
  }

  .event-card.concert { border-left: 3px solid var(--concert); }
  .event-card.album { border-left: 3px solid var(--album); }
  .event-card.promo { border-left: 3px solid var(--promo); }
  .event-card.live { border-left: 3px solid var(--live); }

  .event-card.concert:hover { border-color: var(--concert); }
  .event-card.album:hover { border-color: var(--album); }
  .event-card.promo:hover { border-color: var(--promo); }
  .event-card.live:hover { border-color: var(--live); }

  .event-dot.concert { border-color: var(--concert); }
  .event-dot.album { border-color: var(--album); }
  .event-dot.promo { border-color: var(--promo); }
  .event-dot.live { border-color: var(--live); }

  .event-type-badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 100px;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .event-card.album.comeback {
    background: rgba(170,255,0,0.12);
    border: 2px solid rgba(170,255,0,0.7);
    border-left: 3px solid var(--album);
    box-shadow: 0 0 24px rgba(170,255,0,0.25), inset 0 0 30px rgba(170,255,0,0.08);
  }

  .event-card.album.comeback .event-title {
    color: var(--album);
  }

  .event-card.anniversary {
    background: rgba(155,95,212,0.15);
    border: 2px solid rgba(155,95,212,0.6);
    border-left: 3px solid var(--anniversary);
    box-shadow: 0 0 24px rgba(155,95,212,0.2), inset 0 0 30px rgba(155,95,212,0.08);
  }

  .event-card.anniversary .event-title {
    color: var(--anniversary);
  }

  .event-dot.anniversary { border-color: var(--anniversary); }
  .badge-anniversary { background: rgba(155,95,212,0.15); color: var(--anniversary); }
  .badge-concert { background: rgba(255,45,155,0.25); color: #ff2d9b; border: 1px solid rgba(255,45,155,0.45); }
  .badge-album { background: rgba(170,255,0,0.13); color: var(--album); }
  .badge-promo { background: rgba(245,200,0,0.13); color: var(--promo); }
  .badge-live { background: rgba(155,95,212,0.15); color: var(--live); }

  .event-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .event-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .event-desc strong {
    color: var(--text);
  }

  .multi-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* 필터 바 */
  .filter-bar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    flex-wrap: wrap;
  }

  .filter-bar.active {
    display: flex;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .filter-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(255,45,155,0.15);
    border: 1px solid rgba(255,45,155,0.3);
    border-radius: 100px;
    padding: 3px 10px;
  }

  .filter-clear {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: none;
    transition: color 0.2s, border-color 0.2s;
  }

  .filter-clear:hover {
    color: var(--text);
    border-color: var(--text);
  }

  /* 해시태그 클릭 가능 스타일 */
  .hashtag {
    cursor: pointer;
    color: var(--muted);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .hashtag:hover {
    color: var(--text);
  }

  /* 필터링된 카드 숨김 */
  .event.hidden {
    display: none;
  }

  .month-section.all-hidden {
    display: none;
  }
  .highlight-banner {
    background: linear-gradient(135deg, rgba(255,45,155,0.1), rgba(170,255,0,0.05));
    border: 1px solid rgba(255,45,155,0.25);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 50px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .banner-icon {
    font-size: 36px;
    line-height: 1;
  }

  .banner-text {}

  .banner-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    font-family: 'Space Mono', monospace;
  }

  .banner-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* 링크 */
  .event-link {
    display: inline-block;
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.05em;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .event-link:hover { opacity: 1; }

  /* 추가 뱃지 */
  .badge-solo { background: rgba(155,95,212,0.15); color: var(--live); }

  /* 푸터 */
  footer {
    margin-top: 60px;
    padding: 30px 0;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .footer-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .footer-text span {
    color: var(--accent);
  }

  /* 애니메이션 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 반응형 */
  @media (max-width: 600px) {
    .timeline::before { left: 76px; }
    .month-num { font-size: 36px; width: 80px; }
    .event-date { width: 80px; font-size: 10px; }
    .header-right { display: none; }
    h1 { font-size: 52px; }
  }
</style>
</head>
<body>
<div class="container">
<header>
<div class="header-inner">
<div class="logo-block">
<div class="logo-tag">TOMORROW X TOGETHER</div>
<h1>
<span class="txt">TXT</span>
<span class="year">2026</span>
</h1>
<div class="subtitle">SCHEDULE · 스케줄 정리</div>
</div>
<div class="header-right">
<div class="member-pills">
<span class="pill">수빈</span>
<span class="pill">연준</span>
<span class="pill">범규</span>
<span class="pill">태현</span>
<span class="pill">휴닝카이</span>
</div>
<div class="subtitle" style="text-align:right">MOA ♡</div>
</div>
</div>
</header>
<!-- 하이라이트 배너 -->

<div class="today-banner" id="todayBanner">
  <div class="today-header">
    <span class="today-label">UPCOMING</span>
    <span class="today-date" id="todayDate"></span>
  </div>
  <div class="today-events" id="todayEvents">
    <div class="today-empty">오늘 스케줄이 없어요 🌙</div>
  </div>
</div>

  
  <div id="countdownBlocks" class="countdown-blocks"></div>
</div>


<!-- 필터 바 -->
<div class="filter-bar" id="filterBar">
<span class="filter-label">FILTER</span>
<span class="filter-tag" id="filterTag"></span>
<button class="filter-clear" id="filterClear">✕ 전체보기</button>
</div>
<!-- 범례 -->

// 렌더링 — 수정 불필요
// =============================================
(function() {
  const timeline = document.getElementById('timeline');

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  MONTHS_CONFIG.forEach(function(mc) {
    const monthEvents = EVENTS.filter(function(e) { return e.month === mc.month; });
    if (monthEvents.length === 0) return;

    const section = el('div', 'month-section' + (mc.collapsed ? ' collapsed' : ''));
    section.dataset.month = mc.month;

    const header = el('div', 'month-header');
    const numDiv = el('div', 'month-num', mc.num);
    const nameDiv = el('div', 'month-name', mc.name);
    if (mc.now) {
      const nowSpan = el('span', null, '● NOW');
      nowSpan.style.cssText = "color:var(--accent);font-size:10px;font-family:'Space Mono',monospace;letter-spacing:0.1em;margin-left:8px";
      nameDiv.appendChild(nowSpan);
    }
    const toggleDiv = el('div', 'month-toggle');
    const arrow = el('span', 'toggle-arrow', '▼');
    toggleDiv.appendChild(arrow);
    header.appendChild(numDiv);
    header.appendChild(nameDiv);
    header.appendChild(toggleDiv);
    section.appendChild(header);

    const eventsContainer = el('div', 'month-events');
    let lastDate = '';

    monthEvents.forEach(function(ev, i) {
      const dateToShow = (ev.date && ev.date !== lastDate) ? ev.date : '';
      if (ev.date) lastDate = ev.date;

      const eventDiv = el('div', 'event');

      const dateDiv = el('div', 'event-date', dateToShow);
      dateDiv.dataset.original = ev.date || '';
      const dotWrap = el('div', 'event-dot-wrap');
      const dot = el('div', 'event-dot ' + ev.category);
      dotWrap.appendChild(dot);

      const cardClass = 'event-card ' + ev.category + (ev.comeback ? ' comeback' : '');
      const card = el('div', cardClass);

      if (ev.badge) {
        const badge = el('span', 'event-type-badge badge-' + ev.category, ev.badge);
        card.appendChild(badge);
      }

      const titleDiv = el('div', 'event-title', ev.title);
      card.appendChild(titleDiv);

      if (ev.desc) {
        const descDiv = el('div', 'event-desc', ev.desc);
        card.appendChild(descDiv);
      }

      (ev.links || []).forEach(function(l) {
        const a = el('a', 'event-link', l.text);
        a.href = l.url;
        a.target = '_blank';
        card.appendChild(a);
      });

      eventDiv.appendChild(dateDiv);
      eventDiv.appendChild(dotWrap);
      eventDiv.appendChild(card);
      eventsContainer.appendChild(eventDiv);
    });

    section.appendChild(eventsContainer);
    timeline.appendChild(section);
  });
})();
</script>

<script>
  // 월 접기/펼치기
  document.querySelectorAll('.month-header').forEach(header => {
    header.addEventListener('click', () => {
      const section = header.closest('.month-section');
      section.classList.toggle('collapsed');
    });
  });

  // 해시태그 파싱 및 클릭 가능하게 변환
  document.querySelectorAll('.event-desc').forEach(desc => {
    desc.innerHTML = desc.innerHTML.replace(/(#[^#<·\n]+?)(?=\s*(?:·|<|#|$))/g, '<span class="hashtag">$1</span>');
  });

  // 모든 카드에 data-date 자동 채우기
  let lastDate = '';
  document.querySelectorAll('.event').forEach(event => {
    const dateEl = event.querySelector('.event-date');
    if (dateEl) {
      if (dateEl.textContent.trim()) lastDate = dateEl.textContent.trim();
      event.dataset.date = lastDate;
    }
  });

  // 필터 기능
  const filterBar = document.getElementById('filterBar');
  const filterTag = document.getElementById('filterTag');
  const filterClear = document.getElementById('filterClear');
  let activeFilter = null;

  document.addEventListener('click', e => {
    if (!e.target.classList.contains('hashtag')) return;
    applyFilter(e.target.textContent.trim());
  });

  filterClear.addEventListener('click', clearFilter);

  // 범례 클릭 필터링
  document.querySelectorAll('.legend-item[data-category]').forEach(item => {
    item.addEventListener('click', () => {
      const cat = item.dataset.category;
      if (item.classList.contains('active')) {
        clearFilter();
      } else {
        document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        // 카테고리로 필터링
        document.querySelectorAll('.event').forEach(ev => {
          const card = ev.querySelector('.event-card');
          const hasClass = card && card.classList.contains(cat);
          ev.classList.toggle('hidden', !hasClass);
        });
        document.querySelectorAll('.month-section').forEach(section => {
          const visibleEvents = section.querySelectorAll('.event:not(.hidden)');
          section.classList.toggle('all-hidden', visibleEvents.length === 0);
          if (visibleEvents.length > 0) section.classList.remove('collapsed');
        });
        updateDateDisplay();
        // 필터바 숨기기 (범례가 대신함)
        filterBar.classList.remove('active');
        activeFilter = null;
      }
    });
  });

  function updateDateDisplay() {
    let lastVisibleDate = '';
    document.querySelectorAll('.event').forEach(event => {
      const dateEl = event.querySelector('.event-date');
      if (!dateEl) return;
      const cardDate = event.dataset.date || '';
      if (event.classList.contains('hidden')) {
        dateEl.textContent = dateEl.dataset.original ?? dateEl.textContent;
        return;
      }
      if (cardDate !== lastVisibleDate) {
        dateEl.textContent = cardDate;
        lastVisibleDate = cardDate;
      } else {
        dateEl.textContent = '';
      }
    });
  }

  function saveOriginalDates() {
    document.querySelectorAll('.event-date').forEach(el => {
      if (el.dataset.original === undefined) el.dataset.original = el.textContent;
    });
  }

  function restoreOriginalDates() {
    document.querySelectorAll('.event-date').forEach(el => {
      if (el.dataset.original !== undefined) el.textContent = el.dataset.original;
    });
  }

  saveOriginalDates();

  function applyFilter(tag) {
    activeFilter = tag;
    filterTag.textContent = tag;
    filterBar.classList.add('active');
    document.querySelectorAll('.event').forEach(event => {
      event.classList.toggle('hidden', !event.textContent.includes(tag));
    });
    document.querySelectorAll('.month-section').forEach(section => {
      const visibleEvents = section.querySelectorAll('.event:not(.hidden)');
      section.classList.toggle('all-hidden', visibleEvents.length === 0);
      if (visibleEvents.length > 0) section.classList.remove('collapsed');
    });
    updateDateDisplay();
  }

  function clearFilter() {
    activeFilter = null;
    filterBar.classList.remove('active');
    document.querySelectorAll('.event').forEach(e => e.classList.remove('hidden'));
    document.querySelectorAll('.month-section').forEach(s => s.classList.remove('all-hidden'));
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
    restoreOriginalDates();
  }

  // UPCOMING + 컴백 D-day
  (function() {
    const now = new Date();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const todayVal = month * 100 + day;

    document.getElementById('todayDate').textContent = '';

    const container = document.getElementById('todayEvents');
    const items = [];

    // 컴백 D-day 아이템
    const comeback = new Date('2026-04-13T18:00:00+09:00');
    const diffDays = Math.floor((comeback - now) / (1000 * 60 * 60 * 24));
    let dLabel;
    if (diffDays > 0) dLabel = 'D-' + diffDays;
    else if (diffDays === 0) dLabel = 'D-DAY';
    else dLabel = 'D+' + Math.abs(diffDays);

    const ddayItem = document.createElement('div');
    ddayItem.className = 'today-item album';
    ddayItem.innerHTML = '<span class="today-item-dday">' + dLabel + '</span>'
      + '<span class="today-item-title">7TH YEAR: 가시덤불에 잠시 바람이 멈췄을 때 발매</span>'
      + '<span class="today-item-arrow">↓</span>';
    ddayItem.addEventListener('click', () => {
      const section = document.querySelector('.month-section[data-month="4"]');
      if (section && section.classList.contains('collapsed')) section.classList.remove('collapsed');
      setTimeout(() => {
        const target = Array.from(document.querySelectorAll('.event-title'))
          .find(el => el.textContent.includes('가시덤불에 잠시 바람이 멈췄을 때 - 발매'));
        if (target) {
          const ev = target.closest('.event');
          ev.scrollIntoView({ behavior: 'smooth', block: 'center' });
          ev.style.transition = 'background 0.3s';
          ev.style.background = 'rgba(170,255,0,0.08)';
          setTimeout(() => { ev.style.background = ''; }, 1200);
        }
      }, 350);
    });
    items.push(ddayItem);

    // 다가오는 이벤트 수집
    const parseDate = s => { const p = s.trim().split('.'); return { m: parseInt(p[0]), d: parseInt(p[1]) }; };
    const upcoming = [];

    document.querySelectorAll('.event').forEach((ev, i) => {
      const dateEl = ev.querySelector('.event-date');
      const dateText = dateEl ? dateEl.dataset.original || dateEl.textContent.trim() : '';
      if (!dateText) return;

      const rangeParts = dateText.split(/[–\-]/);
      const start = parseDate(rangeParts[0]);
      const startVal = start.m * 100 + start.d;
      let endVal = startVal;
      if (rangeParts.length > 1) {
        const endStr = rangeParts[1].trim();
        const end = endStr.includes('.') ? parseDate(endStr) : { m: start.m, d: parseInt(endStr) };
        endVal = end.m * 100 + end.d;
      }

      if (endVal < todayVal) return;
      if (startVal > todayVal + 1) return; // 오늘/내일만

      const card = ev.querySelector('.event-card');
      const titleEl = ev.querySelector('.event-title');
      if (!card || !titleEl) return;
      if (titleEl.textContent.includes('가시덤불에 잠시 바람이 멈췄을 때 - 발매')) return;

      const descEl = ev.querySelector('.event-desc');
      const descText = descEl ? descEl.textContent : '';
      const timeMatch = descText.match(/(?:오전|오후)\s*\d+:\d+/);
      const timeStr = timeMatch ? timeMatch[0] : '';

      const diffFromToday = startVal - todayVal;
      let dateLabel;
      if (diffFromToday <= 0) dateLabel = '오늘';
      else if (diffFromToday === 1) dateLabel = '내일';
      else dateLabel = start.m + '/' + start.d;

      upcoming.push({ ev, i, startVal, titleEl, card, timeStr, dateLabel });
    });

    upcoming.sort((a, b) => a.startVal - b.startVal);
    upcoming.forEach(({ ev, i, titleEl, card, timeStr, dateLabel }) => {
      const cardClass = Array.from(card.classList).find(c =>
        ['concert','album','promo','live','anniversary'].includes(c)
      ) || 'promo';

      ev.id = 'ev-today-' + i;
      const item = document.createElement('div');
      item.className = 'today-item ' + cardClass;
      item.innerHTML = '<span class="today-item-date">' + dateLabel + '</span>'
        + (timeStr ? '<span class="today-item-time">' + timeStr + '</span>' : '')
        + '<span class="today-item-title">' + titleEl.textContent.trim() + '</span>'
        + '<span class="today-item-arrow">↓</span>';
      item.addEventListener('click', () => {
        const section = ev.closest('.month-section');
        if (section && section.classList.contains('collapsed')) section.classList.remove('collapsed');
        setTimeout(() => {
          ev.scrollIntoView({ behavior: 'smooth', block: 'center' });
          ev.style.transition = 'background 0.3s';
          ev.style.background = 'rgba(255,45,155,0.08)';
          setTimeout(() => { ev.style.background = ''; }, 1200);
        }, 350);
      });
      items.push(item);
    });

    container.innerHTML = '';
    items.forEach(item => container.appendChild(item));
  })();

  // 배너 D-day 텍스트
  (function() {
    const target = new Date('2026-04-13T18:00:00+09:00');
    const diff = Math.floor((target - new Date()) / (1000 * 60 * 60 * 24));
    const el = document.getElementById('bannerTitle');
    if (!el) return;
    if (diff > 0) el.textContent = '재계약 후 첫 컴백 D-' + diff;
    else if (diff === 0) el.textContent = '재계약 후 첫 컴백 D-DAY 🌿';
    else el.textContent = '재계약 후 첫 컴백 D+' + Math.abs(diff);
  })();

</script>
